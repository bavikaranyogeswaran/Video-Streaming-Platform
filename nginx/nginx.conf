events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" upstream="$upstream_addr"';

  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 600M;

  # ── Streaming replicas (Round-Robin Load Balancer) ─────────────
  upstream streaming_backend {
    server streaming-1:3001 max_fails=1 fail_timeout=10s;
    server streaming-2:3001 max_fails=1 fail_timeout=10s;
    server streaming-3:3001 max_fails=1 fail_timeout=10s;
  }

  server {
    listen 80;
    server_name localhost;

    # ── NestJS API Gateway ──────────────────────────────────────
    location /api/ {
      proxy_pass         http://backend:3000/api/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   Connection        "";
    }

    # ── Health Monitor ──────────────────────────────────────────
    location /api/system/health/ {
      proxy_pass         http://health-monitor:5000/health/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   Connection        "";
    }

    # ── HLS Streaming (Load Balanced across 3 replicas) ─────────
    location /stream/ {
      proxy_pass         http://streaming_backend/stream/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   Connection        "";

      # Expose which upstream replica handled the request
      add_header X-Upstream-Server $upstream_addr always;
      add_header X-Replica-ID     $upstream_addr always;

      # HLS needs no-cache for live/fresh segments
      add_header Cache-Control "no-cache, no-store" always;
    }

    # ── React Frontend ───────────────────────────────────────────
    location / {
      proxy_pass         http://frontend:5173/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
    }
  }
}
