services:

  # ────────────────────────────────────────────────────────────────
  # NGINX — Load Balancer & Reverse Proxy (port 80)
  # ────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: vsp-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      streaming-1:
        condition: service_healthy
      streaming-2:
        condition: service_healthy
      streaming-3:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - vsp-network

  # ────────────────────────────────────────────────────────────────
  # REDIS — Metadata Cache + Health State (AOF persistent)
  # ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vsp-redis
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    networks:
      - vsp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────────────────────────
  # BACKEND — NestJS + TypeScript API Gateway (port 3000)
  # ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vsp-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=vsp_super_secret_jwt_key_change_in_prod_2024
      - JWT_EXPIRES_IN=24h
      - STORAGE_NODE_A=http://storage-node-a:4001
      - STORAGE_NODE_B=http://storage-node-b:4001
      - STORAGE_NODE_C=http://storage-node-c:4001
      - REPLICATION_MIN_REPLICAS=2
      - REPLICATION_NODE_TIMEOUT_MS=60000
      # MinIO (S3-compatible) durable archive for raw originals
      - S3_ARCHIVE_ENABLED=true
      - S3_ENDPOINT=http://minio:9000
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY_ID=vsp_minio_admin
      - S3_SECRET_ACCESS_KEY=vsp_minio_change_in_prod_2024
      - S3_BUCKET=vsp-originals
      - S3_FORCE_PATH_STYLE=true
    volumes:
      # Persisted staging so crash mid-transcode/replicate can be recovered
      - backend-staging:/tmp/uploads
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - vsp-network

  # ────────────────────────────────────────────────────────────────
  # MINIO — S3-compatible durable archive for raw uploaded originals
  # Cold tier: if all 3 hot storage nodes lose their volumes, originals
  # can be re-transcoded from here. Console UI on :9001.
  # ────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: vsp-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      - MINIO_ROOT_USER=vsp_minio_admin
      - MINIO_ROOT_PASSWORD=vsp_minio_change_in_prod_2024
    volumes:
      - minio-data:/data
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - vsp-network

  # One-shot job: create the bucket if it doesn't exist yet
  minio-init:
    image: minio/mc:latest
    container_name: vsp-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set vsp http://minio:9000 vsp_minio_admin vsp_minio_change_in_prod_2024 &&
      mc mb -p vsp/vsp-originals || true &&
      mc anonymous set download vsp/vsp-originals || true &&
      echo 'bucket vsp-originals ready'
      "
    restart: "no"
    networks:
      - vsp-network

  # ────────────────────────────────────────────────────────────────
  # STREAMING SERVICE — 3 Replicas (Round-Robin via Nginx)
  # ────────────────────────────────────────────────────────────────
  streaming-1:
    build:
      context: ./services/streaming-service
      dockerfile: Dockerfile
    container_name: vsp-streaming-1
    ports:
      - "3001:3001"
    environment:
      - REPLICA_ID=1
      - PORT=3001
      - REDIS_URL=redis://redis:6379
      - STORAGE_NODE_A=http://storage-node-a:4001
      - STORAGE_NODE_B=http://storage-node-b:4001
      - STORAGE_NODE_C=http://storage-node-c:4001
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - vsp-network

  streaming-2:
    build:
      context: ./services/streaming-service
      dockerfile: Dockerfile
    container_name: vsp-streaming-2
    ports:
      - "3002:3001"
    environment:
      - REPLICA_ID=2
      - PORT=3001
      - REDIS_URL=redis://redis:6379
      - STORAGE_NODE_A=http://storage-node-a:4001
      - STORAGE_NODE_B=http://storage-node-b:4001
      - STORAGE_NODE_C=http://storage-node-c:4001
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - vsp-network

  streaming-3:
    build:
      context: ./services/streaming-service
      dockerfile: Dockerfile
    container_name: vsp-streaming-3
    ports:
      - "3003:3001"
    environment:
      - REPLICA_ID=3
      - PORT=3001
      - REDIS_URL=redis://redis:6379
      - STORAGE_NODE_A=http://storage-node-a:4001
      - STORAGE_NODE_B=http://storage-node-b:4001
      - STORAGE_NODE_C=http://storage-node-c:4001
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - vsp-network

  # ────────────────────────────────────────────────────────────────
  # STORAGE NODES — Distributed Video Storage (3 nodes)
  # Node A = Asia | Node B = EU | Node C = US
  # ────────────────────────────────────────────────────────────────
  storage-node-a:
    build:
      context: ./services/storage-node
      dockerfile: Dockerfile
    container_name: vsp-storage-a
    ports:
      - "4001:4001"
    environment:
      - NODE_ID=A
      - NODE_LABEL=Asia
      - PORT=4001
    volumes:
      - storage-a:/videos
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4001/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - vsp-network

  storage-node-b:
    build:
      context: ./services/storage-node
      dockerfile: Dockerfile
    container_name: vsp-storage-b
    ports:
      - "4002:4001"
    environment:
      - NODE_ID=B
      - NODE_LABEL=EU
      - PORT=4001
    volumes:
      - storage-b:/videos
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4001/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - vsp-network

  storage-node-c:
    build:
      context: ./services/storage-node
      dockerfile: Dockerfile
    container_name: vsp-storage-c
    ports:
      - "4003:4001"
    environment:
      - NODE_ID=C
      - NODE_LABEL=US
      - PORT=4001
    volumes:
      - storage-c:/videos
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4001/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - vsp-network

  # ────────────────────────────────────────────────────────────────
  # HEALTH MONITOR — Polls all nodes every 5s → Redis
  # ────────────────────────────────────────────────────────────────
  health-monitor:
    build:
      context: ./services/health-monitor
      dockerfile: Dockerfile
    container_name: vsp-health-monitor
    ports:
      - "5000:5000"
    environment:
      - REDIS_URL=redis://redis:6379
      - STREAMING_NODES=http://streaming-1:3001,http://streaming-2:3001,http://streaming-3:3001
      - STORAGE_NODES=http://storage-node-a:4001,http://storage-node-b:4001,http://storage-node-c:4001
      - POLL_INTERVAL=5000
      - PORT=5000
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.15'
          memory: 128M
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - vsp-network

  # ────────────────────────────────────────────────────────────────
  # FRONTEND — React + TypeScript (production static build via nginx)
  # ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vsp-frontend
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost/api
      - VITE_STREAM_URL=http://localhost/stream
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - vsp-network

  # ────────────────────────────────────────────────────────────────
  # PROMETHEUS — Metrics Collector (port 9090)
  # ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: vsp-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    networks:
      - vsp-network

  # ────────────────────────────────────────────────────────────────
  # GRAFANA — Dashboard Visualization (port 3005)
  # ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: vsp-grafana
    ports:
      - "3005:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    networks:
      - vsp-network

  # ────────────────────────────────────────────────────────────────
  # JAEGER — Distributed Tracing Backend (port 16686)
  # ────────────────────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: vsp-jaeger
    ports:
      - "16686:16686" # UI
      - "4318:4318"   # OTLP HTTP
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    networks:
      - vsp-network

# ────────────────────────────────────────────────────────────────
# NETWORKS
# ────────────────────────────────────────────────────────────────
networks:
  vsp-network:
    driver: bridge

# ────────────────────────────────────────────────────────────────
# VOLUMES (persistent across container restarts)
# ────────────────────────────────────────────────────────────────
volumes:
  redis-data:      # Redis AOF data
  storage-a:       # Storage Node A (Asia) videos
  storage-b:       # Storage Node B (EU) videos
  storage-c:       # Storage Node C (US) videos
  backend-staging: # Persisted backend /tmp/uploads — survives crashes for recovery
  minio-data:      # MinIO durable archive of raw originals
  prometheus-data: # Metrics history
  grafana-data:    # Dashboard configurations
